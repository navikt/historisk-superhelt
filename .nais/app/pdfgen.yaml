apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: superhelt-pdfgen
  namespace: historisk
  labels:
    team: historisk
spec:
  image: "{{image}}"
  port: 8080
  accessPolicy:
    inbound:
      rules:
        - application: superhelt
  azure:
    application:
      enabled: false
  liveness:
    path: /internal/is_alive
    initialDelay: 5
    timeout: 10
  readiness:
    path: /internal/is_ready
    initialDelay: 5
    timeout: 10
  prometheus:
    enabled: true
    path: /metrics
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      memory: 1024Mi
    requests:
      memory: 512Mi
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
