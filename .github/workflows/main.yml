name: Bygg og deploy main

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build-and-test.yml
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
    permissions:
      packages: write
      contents: read
      id-token: write
  e2e:
    uses: ./.github/workflows/e2e.yaml
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
    permissions:
      packages: write
      contents: read
      id-token: write
  deploy_dev:
    needs:
      - build
      - e2e
    name: "Deploy til dev"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy backend til dev-gcp
        uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 #v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app/backend.yaml
          VARS: .nais/dev.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
  deploy_prod:
    needs:
      - build
      - deploy_dev
    name: "Deploy til prod"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy backend til prod-gcp
        uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 #v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/app/backend.yaml
          VARS: .nais/prod.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
