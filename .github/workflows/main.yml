name: Bygg og deploy main

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build-and-test.yml
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
    permissions:
      packages: write
      contents: read
      id-token: write
  e2e:
    uses: ./.github/workflows/e2e.yaml
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
    permissions:
      packages: write
      contents: read
      id-token: write
  deploy_dev:
    needs:
      - build
      - e2e
    name: "Deploy til dev"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Deploy backend til dev-gcp
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb #v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app/backend.yaml
          VARS: .nais/dev.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
  deploy_prod:
    needs:
      - build
      - deploy_dev
    name: "Deploy til prod"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Deploy backend til prod-gcp
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb #v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/app/backend.yaml
          VARS: .nais/prod.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
