name: Bygg og deploy reise-kalkulator

on:
  push:
    branches:
      - main
    paths:
      - "reise-kalkulator/**"
      - ".github/workflows/reise-kalkulator.yml"
  pull_request:
    branches:
      - main
    paths:
      - "reise-kalkulator/**"
      - ".github/workflows/reise-kalkulator.yml"

defaults:
  run:
    working-directory: reise-kalkulator

jobs:
  build:
    name: Bygg og test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
      telemetry: ${{ steps.docker-build-push.outputs.telemetry }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reise-kalkulator/package-lock.json

      - name: Installer avhengigheter
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Formateringssjekk
        run: npm run format:check

      - name: Tester
        run: npm run test

      - name: Bygg
        run: npm run build

      - name: Bygg og push Docker-image til GAR
        if: github.ref == 'refs/heads/main'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: historisk
          docker_context: ./reise-kalkulator

  deploy_dev:
    name: Deploy til dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy reise-kalkulator til dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: reise-kalkulator/.nais/app.yaml
          VARS: reise-kalkulator/.nais/dev.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}

  deploy_prod:
    name: Deploy til prod
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy_dev
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy reise-kalkulator til prod-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: reise-kalkulator/.nais/app.yaml
          VARS: reise-kalkulator/.nais/prod.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
