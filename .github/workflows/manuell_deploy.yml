name: "Manuell deploy til dev"

on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-and-test.yml
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
    permissions:
      packages: write
      contents: read
      id-token: write
  deploy_dev:
    needs:
      - build
    name: "Deploy til dev"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Deploy backend til dev-gcp
        uses: nais/deploy/actions/deploy@8a6fb62e73f837af6287d5db84a46ea96aa6c30d #v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app/backend.yaml
          VARS: .nais/dev.json
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
